name: CI

# Run on pushes to main and on every pull request targeting it.
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cucchiaio
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Unit tests
        run: ./mvnw -B test
      - name: Integration tests
        run: ./mvnw -B verify
      - name: Upload test reports
        if: always() # upload reports even after failure of previous steps
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/target/surefire-reports/*.xml'
          if-no-files-found: ignore